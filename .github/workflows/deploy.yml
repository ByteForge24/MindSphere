name: CI-CD Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment"
          # Replace this with actual deployment command
          # Example: railway up --service staging

  smoke-tests:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests against staging
        run: |
          E2E_BASE_URL=https://staging.yourdomain.com npx playwright test e2e/smoke.spec.ts

  deploy-production:
    needs: smoke-tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production"
          # Replace with real deployment command
          # Example: railway up --service production
